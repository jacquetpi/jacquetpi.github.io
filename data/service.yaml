# Service entries (flat, typed schema).
#
# Required:
# - domain: conference | journal | organization
# - role_type: free-text role label used for display
# - role_group: grouping key used by website/CV sections
# - venue: display name
#
# Optional:
# - url: link to venue/event page
# - year: single year
# - years: list of years
# - role_prefix: optional text prefix before venue for a specific entry (e.g., "Web Chair")
# - note: free-form detail ("Workshop", "guide, session chair", etc.)
# - sub_reviewing: true marks a sub-reviewing entry (legend appears in CV/site section)
# - displayed_on_site: false hides entry on website (default true)
# - selected: true includes entry in homepage service block (selected-only behavior)
#
# role_group values:
# - conference: pc_member, pc_chair, artifact_pc_member, artifact_chair,
#               general_chair, reviewer
# - journal: reviewer, editor
# - journal/conference: reviewer, sub_reviewer
# - organization: volunteer, chair, other
#
# role_type examples (display text): General Chair, PC Member, Reviewer, etc.

entries:
  - domain: "conference"
    role_type: "PC Member"
    role_group: "pc_member"
    venue: "IEEE CloudCom"
    url: "https://www.cloudcom2026.org/committees"
    year: 2026
    selected: true

  - domain: "conference"
    role_type: "PC Member"
    role_group: "pc_member"
    venue: "IEEE Cluster"
    url: "https://clustercomp.org/2026/committees/"
